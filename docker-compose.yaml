version: "3.9"

services:
  headscale:
    build:
      context: .
      dockerfile: Dockerfile
    image: headscale:latest
    container_name: headscale
    restart: unless-stopped
    ports:
      - "8080:8080"       # Web UI
      - "443:443"         # Main server (Tailscale clients)
      - "80:80"           # ACME HTTP-01 challenge
      - "9090:9090"       # Metrics
      - "3478:3478/udp"   # STUN
    volumes:
      - headscale-data:/var/lib/headscale
      - ./config.yaml:/etc/headscale/config.yaml:ro
    environment:
      - TZ=UTC
    command: serve -c /etc/headscale/config.yaml

  # Optional: PostgreSQL for production deployments
  # Uncomment and set database.type: postgres in config.yaml
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: headscale-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: headscale
  #     POSTGRES_PASSWORD: changeme
  #     POSTGRES_DB: headscale
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U headscale"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  headscale-data:
  # postgres-data:
